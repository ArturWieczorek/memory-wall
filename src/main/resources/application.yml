wall:
  # Cardano backend (Yaci DevKit's Blockfrost-compatible API by default; a preprod/preview URL later).
  backend-url: ${WALL_BACKEND_URL:http://localhost:8080/api/v1/}
  # Provider project id / API key. "wall" is fine for local Yaci DevKit (it ignores it); for hosted
  # Blockfrost (preprod/mainnet) set your real key via the env var. A SECRET - never commit it.
  backend-project-id: ${WALL_BACKEND_PROJECT_ID:wall}

  # Browser origins allowed to call this API (the hosted UI). Comma-separated; "*" allows any.
  # e.g. WALL_CORS_ORIGINS=https://my-wall.pages.dev,https://my-wall.example.com
  cors-allowed-origins: ${WALL_CORS_ORIGINS:*}

  # Per-IP request cap, so a public/home-hosted box cannot be trivially hammered.
  rate-limit:
    enabled: ${WALL_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${WALL_RATE_LIMIT_RPM:20}
    # Header carrying the real client IP behind a trusted proxy (e.g. CF-Connecting-IP behind
    # Cloudflare). Blank = use the socket address. Do NOT set to X-Forwarded-For (spoofable).
    client-ip-header: ${WALL_CLIENT_IP_HEADER:}

  # Fee / pin tier (OFF by default - leave fee-address blank for free posting). When set, a post built
  # by this backend must tip at least min-fee-lovelace to the fee address; a tip >= pin-fee-lovelace
  # pins the post to the top of the feed (the amount is verified on-chain when reading the feed).
  fee-address: ${WALL_FEE_ADDRESS:}
  min-fee-lovelace: ${WALL_MIN_FEE_LOVELACE:0}
  pin-fee-lovelace: ${WALL_PIN_FEE_LOVELACE:0}
  # How many posts may be pinned at once (highest tips win the slots); <=0 means unlimited.
  max-pinned: ${WALL_MAX_PINNED:3}
  # How long a pin lasts from its timestamp before reverting to a normal post (default 7 days);
  # <=0 means pins never expire.
  pin-duration-seconds: ${WALL_PIN_DURATION_SECONDS:604800}

  # Reject a post whose message exceeds this many UTF-8 bytes (guards against huge-tx abuse).
  max-message-bytes: ${WALL_MAX_MESSAGE_BYTES:4096}
  # Reject a submit whose txCbor/witness hex exceeds this many characters.
  max-tx-chars: ${WALL_MAX_TX_CHARS:100000}

  # Full-history index (the in-memory cache of every post that powers global pinning + search).
  index:
    # Refresh cadence (ms) and paging limits when reading the chain. Defaults are fine.
    refresh-ms: ${WALL_INDEX_REFRESH_MS:60000}
    page-size: ${WALL_INDEX_PAGE_SIZE:100}
    max-pages: ${WALL_INDEX_MAX_PAGES:500}
    # OPTIONAL persistence. Blank = in-memory only (re-ingests from the chain on restart). Set a
    # file path (e.g. data/wall-index.db) to persist the index to SQLite, so a restart starts warm
    # and only fetches new posts. The file is a local cache of PUBLIC on-chain data - no secrets.
    db-path: ${WALL_INDEX_DB_PATH:}

  # Display-side moderation: comma-separated terms; a post whose author or message contains one is
  # hidden from the feed (it is still permanent on-chain - we just do not show it).
  blocklist: ${WALL_BLOCKLIST:}
  # Curator moderation: comma-separated transaction hashes to hide exactly (a precise "hide this one
  # post" lever). Also display-side only - the post stays permanent on-chain.
  blocked-tx-hashes: ${WALL_BLOCKED_TX_HASHES:}

server:
  port: ${WALL_PORT:8090}
  # Bind to localhost so the backend is reachable ONLY through the tunnel (Funnel/Cloudflare), not
  # directly on the LAN. Set WALL_BIND=0.0.0.0 only if you deliberately want direct network access.
  address: ${WALL_BIND:127.0.0.1}
